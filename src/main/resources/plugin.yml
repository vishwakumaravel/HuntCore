name: HuntCore
version: ${version}
main: com.huntcore.HuntCorePlugin
api-version: '1.21'
description: Lightweight hunt-style minigame plugin for Paper servers.
author: HuntCore
commands:
  runner:
    description: Select the runner role.
    usage: /runner
  hunter:
    description: Select the hunter role.
    usage: /hunter
  spectate:
    description: Toggle spectator mode.
    usage: /spectate
  ready:
    description: Mark yourself as ready.
    usage: /ready
  unready:
    description: Remove your ready status.
    usage: /unready
  hunterkeepinventory:
    description: Change whether hunters keep inventory and XP on death.
    usage: /hunterkeepinventory <on|off|toggle|status>
    permission: huntcore.admin
  setlobby:
    description: Set the waiting lobby to your current location.
    usage: /setlobby
    permission: huntcore.admin
  setpvpspawn:
    description: Set the PvP arena spawn to your current location.
    usage: /setpvpspawn
    permission: huntcore.admin
  reset:
    description: Return to the waiting lobby spawn.
    usage: /reset
  pvp:
    description: Enter the PvP arena.
    usage: /pvp
  pvpleave:
    description: Leave the PvP arena and restore your previous state.
    usage: /pvpleave
  pause:
    description: Pause the active manhunt match.
    usage: /pause
    permission: huntcore.admin
  unpause:
    description: Resume the paused manhunt match.
    usage: /unpause
    permission: huntcore.admin
  installlobbymap:
    description: Import a world zip and use it as the waiting lobby.
    usage: /installlobbymap [zip-path] [world-name]
    permission: huntcore.admin
  installpvpmap:
    description: Import a world zip and use it as the PvP arena.
    usage: /installpvpmap [zip-path] [world-name]
    permission: huntcore.admin
  huntstatus:
    description: Show HuntCore lobby, cache, and match status.
    usage: /huntstatus
  matchstats:
    description: Show recent HuntCore match results.
    usage: /matchstats [1-10]
permissions:
  huntcore.admin:
    description: Allows changing HuntCore match settings in game.
    default: op

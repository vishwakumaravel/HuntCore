name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-plugin:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build plugin
        run: ./gradlew build

      - name: Upload plugin jar
        uses: actions/upload-artifact@v4
        with:
          name: plugin-jar
          path: build/libs/*.jar
          if-no-files-found: error

  build-backend-api:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build backend API
        run: ./gradlew -p backend-api build

      - name: Upload backend jar
        uses: actions/upload-artifact@v4
        with:
          name: backend-api-jar
          path: backend-api/build/libs/*.jar
          if-no-files-found: error

  build-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: dashboard
        run: npm run build

      - name: Upload dashboard dist
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard/dist
          if-no-files-found: error

  validate-docker-images:
    runs-on: ubuntu-latest
    needs:
      - build-backend-api
      - build-dashboard

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate backend-api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend-api/Dockerfile
          push: false
          tags: huntcore-backend-api:ci
          cache-from: type=gha,scope=backend-api
          cache-to: type=gha,mode=max,scope=backend-api

      - name: Validate dashboard image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dashboard/Dockerfile
          push: false
          tags: huntcore-dashboard:ci
          cache-from: type=gha,scope=dashboard
          cache-to: type=gha,mode=max,scope=dashboard
